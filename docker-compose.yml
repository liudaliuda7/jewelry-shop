services:
  jewelry-shop:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    working_dir: /app
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: ["bash", "-c", "if [ ! -d .git ]; then git init && git config user.email 'agent@docker.local' && git config user.name 'Docker Agent' && git add . && git commit -m 'Initial container state' 2>/dev/null || true; fi && npm run dev"]

volumes:
  node_modules:
